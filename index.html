<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limpiando con los Ojos · SBM</title>
<style>
  :root{
    --bg:#FBF8F3;
    --card:#FFFFFF;
    --ink:#21303A;
    --ink-soft:#5E6B73;
    --line:#E8E1D5;
    --orange:#E0701D;
    --orange-deep:#B25415;
    --orange-soft:#FCEEDF;
    --teal:#1C5C78;
    --teal-deep:#154B62;
    --teal-soft:#E6F0F4;
    --shadow:0 2px 0 rgba(0,0,0,.03), 0 14px 32px -20px rgba(21,75,98,.45);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:19px;line-height:1.55;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  header{background:var(--teal);color:#fff;padding:15px 20px 16px;position:sticky;top:0;z-index:20}
  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.3px;font-size:15px}
  .brand .logo{width:30px;height:30px;flex:none}
  .modtag{font-size:12px;color:#bcd5df;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
  .progress{margin-top:12px;height:8px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
  .bar{height:100%;width:0;background:var(--orange);border-radius:99px;transition:width .35s ease}

  main{flex:1;padding:24px 20px 36px}
  .screen{display:none;animation:fade .35s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .eyebrow{text-transform:uppercase;letter-spacing:2px;font-size:13px;font-weight:800;color:var(--orange-deep)}
  h1{font-size:30px;line-height:1.14;margin:8px 0 14px;font-weight:800;letter-spacing:-.5px;color:var(--teal)}
  h2{font-size:25px;line-height:1.2;margin:6px 0 10px;font-weight:800;letter-spacing:-.3px;color:var(--teal)}
  p{margin:0 0 14px}
  .lead{color:var(--ink-soft);font-size:19px}

  .eye-hero{display:flex;justify-content:center;margin:6px 0 18px}

  .field{margin:16px 0}
  label{display:block;font-weight:700;margin-bottom:7px;font-size:17px}
  input{width:100%;font-size:19px;padding:15px 16px;border:2px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font-family:inherit}
  input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 4px rgba(224,112,29,.16)}

  .btn{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;font-size:20px;font-weight:800;padding:18px;border-radius:14px;margin-top:8px;background:var(--teal);color:#fff;transition:transform .08s ease, opacity .2s}
  .btn:active{transform:scale(.98)}
  .btn.go{background:var(--orange);color:#fff}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.ghost{background:#fff;color:var(--teal);border:2px solid var(--line)}

  .modhead{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .modhead .icn{width:60px;height:60px;flex:none;border-radius:14px;background:var(--teal);display:flex;align-items:center;justify-content:center}

  .lead-block{font-size:19px;color:var(--ink);background:var(--teal-soft);border-radius:var(--radius);padding:16px 18px;margin:16px 0;border:2px solid #CFE2EA}

  .blk-title{font-weight:800;font-size:19px;margin:22px 0 10px;color:var(--ink)}

  ul.bullets,ul.checks{list-style:none;margin:8px 0 0;padding:0}
  ul.bullets li,ul.checks li{position:relative;padding:9px 0 9px 32px;font-size:18px;border-top:1px solid var(--line)}
  ul.bullets li:first-child,ul.checks li:first-child{border-top:none}
  ul.bullets li::before{content:"";position:absolute;left:6px;top:18px;width:9px;height:9px;border-radius:50%;background:var(--orange)}
  ul.checks li::before{content:"✓";position:absolute;left:4px;top:9px;color:var(--orange);font-weight:900;font-size:19px}

  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:10px}
  .chip{background:#fff;border:2px solid var(--line);border-radius:99px;padding:9px 16px;font-weight:700;font-size:17px;color:var(--teal)}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .ccard{background:#fff;border:2px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
  .ccard .ci{width:44px;height:44px;border-radius:12px;background:var(--orange-soft);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:8px}
  .ccard .ch{font-weight:800;color:var(--orange-deep);font-size:16px;margin-bottom:3px}
  .ccard .ct{font-size:15px;color:var(--ink-soft);line-height:1.4}
  .cards.sentidos .ccard .ci{background:var(--teal-soft)}
  .cards.sentidos .ccard .ch{color:var(--teal)}

  .quote{position:relative;background:var(--teal);color:#fff;border-radius:var(--radius);padding:22px 20px;margin:20px 0;font-size:21px;font-weight:700;line-height:1.35}
  .quote .qm{font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--orange);font-weight:800;margin-bottom:8px}

  .callout{background:var(--orange-soft);border:2px solid #F2D2AE;border-radius:var(--radius);padding:14px 16px;margin:18px 0;font-size:17px}
  .callout b{color:var(--orange-deep)}

  .nav{display:flex;gap:12px;margin-top:24px}
  .nav .btn{margin-top:0}
  .nav .btn.ghost{flex:0 0 38%}

  /* Concurso */
  .prize{display:flex;align-items:center;gap:14px;background:var(--orange);color:#fff;border-radius:var(--radius);padding:18px;margin:16px 0;font-weight:700;font-size:19px}
  .prize .pe{font-size:34px}
  ol.steps{margin:14px 0 0;padding-left:0;list-style:none;counter-reset:s}
  ol.steps li{counter-increment:s;position:relative;padding:11px 0 11px 44px;border-top:1px solid var(--line);font-size:18px}
  ol.steps li:first-child{border-top:none}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:10px;width:30px;height:30px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}

  /* Quiz */
  .qcount{font-size:15px;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
  .opt{display:block;width:100%;text-align:left;font-family:inherit;font-size:18px;padding:16px;border:2px solid var(--line);border-radius:13px;background:#fff;margin:10px 0;cursor:pointer;color:var(--ink);transition:border-color .15s, background .15s}
  .opt:active{transform:scale(.99)}
  .opt.correct{border-color:var(--orange);background:var(--orange-soft);font-weight:700}
  .opt.wrong{border-color:#C5283D;background:#FCEBED}
  .opt.locked{pointer-events:none}
  .feedback{margin:14px 0;padding:14px 16px;border-radius:13px;font-size:17px;font-weight:600;display:none}
  .feedback.ok{display:block;background:var(--orange-soft);color:var(--orange-deep);border:2px solid #F2D2AE}
  .feedback.no{display:block;background:#FCEBED;color:#C5283D;border:2px solid #F2C4CB}

  /* Resultado */
  .cert{background:#fff;border:3px solid var(--teal);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);margin:18px 0}
  .cert .ctop{background:var(--teal);height:8px}
  .cert .cbody{padding:24px 22px}
  .cert .ctitle{text-align:center;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft)}
  .cert .seal{display:flex;justify-content:center;margin:14px 0}
  .cert .ring{width:84px;height:84px;border-radius:50%;border:5px solid var(--orange);display:flex;align-items:center;justify-content:center;color:var(--orange);font-size:40px;font-weight:900}
  .cert .name{text-align:center;font-size:27px;font-weight:800;margin:8px 0 2px;color:var(--teal)}
  .cert .meta{text-align:center;color:var(--ink-soft);font-size:16px}
  .cert .scorebox{display:flex;margin:18px 0 4px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .cert .scorebox div{flex:1;text-align:center;padding:14px 8px}
  .cert .scorebox div + div{border-left:1px solid var(--line)}
  .cert .scorebox .num{font-size:24px;font-weight:800;display:block;line-height:1;color:var(--teal)}
  .cert .scorebox .lbl{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);margin-top:6px}
  .cert .finalmsg{font-style:italic;text-align:center;color:var(--ink-soft);font-size:16px;margin-top:16px;line-height:1.4}

  .capture-note{display:flex;gap:12px;align-items:center;background:var(--orange-soft);border:2px solid #F2D2AE;border-radius:14px;padding:14px 16px;margin:8px 0 4px;font-size:17px;font-weight:600}
  .capture-note .em{font-size:24px}

  footer{text-align:center;color:var(--ink-soft);font-size:13px;padding:18px;border-top:1px solid var(--line)}
  footer b{color:var(--ink)}
  .credit{margin-top:6px;font-size:12px;letter-spacing:.3px}
  .credit b{color:var(--orange-deep)}

  .savebadge{display:flex;gap:10px;align-items:center;border-radius:14px;padding:13px 16px;margin:14px 0 4px;font-size:16px;font-weight:700}
  .savebadge .se{font-size:20px}
  .savebadge.saving{background:#EEF2F4;color:var(--ink-soft);border:2px solid var(--line)}
  .savebadge.ok{background:var(--teal-soft);color:var(--teal);border:2px solid #BcD9E4}
  .savebadge.err{background:var(--orange-soft);color:var(--orange-deep);border:2px solid #F2D2AE}

  .adminlink{margin-top:10px;font-size:12px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit}
  .overlay{display:none;position:fixed;inset:0;background:rgba(20,30,38,.55);z-index:50;padding:16px;overflow-y:auto}
  .overlay.on{display:block}
  .panel{max-width:920px;margin:24px auto;background:#fff;border-radius:18px;box-shadow:0 20px 60px -20px rgba(0,0,0,.5);overflow:hidden}
  .panel .ptop{background:var(--teal);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
  .panel .ptop b{font-size:18px}
  .panel .pclose{background:rgba(255,255,255,.18);border:none;color:#fff;width:34px;height:34px;border-radius:9px;font-size:20px;cursor:pointer;font-family:inherit}
  .pbody{padding:20px}
  .pinrow{display:flex;gap:10px;margin-top:8px}
  .pinrow input{flex:1}
  .pinmsg{color:var(--stop,#C5283D);font-size:15px;font-weight:600;margin-top:10px;min-height:18px}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .toolbar input{flex:1;min-width:160px;font-size:16px;padding:11px 14px;border:2px solid var(--line);border-radius:10px;font-family:inherit}
  .xbtn{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:15px;padding:11px 16px;border-radius:10px;color:#fff;white-space:nowrap}
  .xbtn.xls{background:#127A4B}
  .xbtn.pdf{background:#C5283D}
  .xbtn.rf{background:var(--teal)}
  .pcount{font-size:14px;color:var(--ink-soft);font-weight:700;margin-bottom:10px}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  table.reg{border-collapse:collapse;width:100%;font-size:15px;min-width:560px}
  table.reg th{background:#F4F1EC;text-align:left;padding:10px 12px;font-weight:800;color:var(--teal);position:sticky;top:0}
  table.reg td{padding:10px 12px;border-top:1px solid var(--line)}
  table.reg tr:nth-child(even) td{background:#FBF9F5}
  .pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:13px;font-weight:700;background:var(--teal-soft);color:var(--teal)}
  .pempty{text-align:center;color:var(--ink-soft);padding:30px;font-size:16px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brandrow">
      <div class="brand">
        <svg class="logo" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg"><path d="M4 30 Q50 2 96 30 Q50 58 4 30 Z" fill="none" stroke="#fff" stroke-width="5"/><circle cx="50" cy="30" r="14" fill="#E0701D"/><circle cx="50" cy="30" r="6" fill="#fff"/></svg>
        <span>Limpiando con los Ojos</span>
      </div>
      <div class="modtag" id="modtag">Inicio</div>

    <div class="progress"><div class="bar" id="bar"></div></div>

  <footer>

    <div class="credit">Desarrollado por <b>Lilliana Retana Tech</b></div>

</div>

<div class="overlay" id="adminOverlay">

    <div class="ptop"><b>Panel del supervisor</b><button class="pclose" id="adminClose">×</button></div>
    <div class="pbody" id="adminBody"></div>
  </div>
</div>

<script>
/* ---------- Iconos ---------- */
const SVG = {
  eye:'<svg width="34" height="34" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg"><path d="M4 30 Q50 2 96 30 Q50 58 4 30 Z" fill="none" stroke="#fff" stroke-width="5"/><circle cx="50" cy="30" r="14" fill="#E0701D"/><circle cx="50" cy="30" r="6" fill="#fff"/></svg>',
  senses:'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg>',
  hands:'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11V6a1.5 1.5 0 0 1 3 0v5M12 11V4.5a1.5 1.5 0 0 1 3 0V11M15 7.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-1a6 6 0 0 1-4.6-2.1L4 15a1.6 1.6 0 0 1 2.4-2.1L8 14.5M9 11V8a1.5 1.5 0 0 0-3 0v4"/></svg>'
};

/* ---------- Contenido ---------- */
const MODULOS = [
  {
    tag:"Módulo 1 de 3", icon:"eye",
    titulo:"¿Qué es Limpiando con los Ojos?",
    sections:[
      {kind:"lead", text:"No basta con limpiar: hay que observar todo el tiempo. Pensá como si el área fuera tuya. Si algo no te gustaría ver como cliente, actuá de inmediato."},
      {kind:"bullets", title:"En el día a día significa:", items:[
        "Ver más allá de la tarea.",
        "Detectar los detalles antes que el cliente.",
        "Pensar como supervisor.",
        "Actuar como dueño del área."
      ]},
      {kind:"cards", title:"Limpiando con los Ojos es…", items:[
        {icon:"💪", head:"Ser dueños", text:"Sentirnos todos dueños de la limpieza y el orden de todo el proyecto."},
        {icon:"⭐", head:"Empoderarnos", text:"Estar conscientes del valor de empoderarnos de la limpieza y el orden."},
        {icon:"😊", head:"Cuidar al cliente", text:"Ser parte del equipo encargado de la felicidad y el bienestar del cliente."},
        {icon:"🤝", head:"Ayudar", text:"Tener el poder de ayudar a mi compañero en su día de trabajo."}
      ]},
      {kind:"callout", text:"Buscamos que cada colaborador desarrolle un <b>ojo crítico y preventivo</b>. No esperamos que el cliente nos señale los problemas: los detectamos nosotros primero."}
    ]
  },
  {
    tag:"Módulo 2 de 3", icon:"senses",
    titulo:"Cómo se hace: los 5 sentidos",
    sections:[
      {kind:"lead", text:"La clave es usar nuestros 5 sentidos en todo momento: mientras trabajamos y cuando pasamos de un área a otra."},
      {kind:"cards-sense", title:"Los 5 sentidos en acción", items:[
        {icon:"👁️", head:"Vista", text:"Ojos abiertos detectando si hay algo desordenado, sucio, tirado o fuera de su lugar."},
        {icon:"👃", head:"Olfato", text:"Narices alertas detectando si hay algo que huele mal."},
        {icon:"👂", head:"Oído", text:"Oídos abiertos detectando ruidos que puedan estar detrás de un daño o suciedad."},
        {icon:"✋", head:"Tacto", text:"Manos dispuestas a recoger, limpiar y despolvar lo que encontramos en el camino."},
        {icon:"👅", head:"Gusto", text:"El gusto por mantener nuestro proyecto en excelentes condiciones."}
      ]},
      {kind:"chips", title:"Los 4 principios del programa", items:["Observar","Actuar inmediatamente","Anticiparse","Cuidar la experiencia del cliente"]},
      {kind:"callout", text:"Estos cuatro principios guían el comportamiento de cada colaborador SBM. <b>No son opcionales</b>: son la base de la calidad que ofrecemos."}
    ]
  },
  {
    tag:"Módulo 3 de 3", icon:"hands",
    titulo:"En la práctica",
    sections:[
      {kind:"lead", text:"Cada turno incluye una revisión visual de las áreas, no solo la limpieza de rutina. Un recorrido consciente puede prevenir una queja grave."},
      {kind:"chips", title:"¿Qué observamos?", items:["Baños","Áreas comunes","Oficinas","Seguridad","Insumos","Detalles visuales"]},
      {kind:"bullets", title:"Buenas prácticas esperadas", items:[
        "Revisar antes de retirarte del área.",
        "Reportar cualquier anomalía.",
        "Mantener una actitud preventiva.",
        "Aplicar mejora continua."
      ]},
      {kind:"checks", title:"Ejemplos reales del día a día", items:[
        "Veo vajilla desordenada en el patio y la recojo para ayudar a los compañeros.",
        "Reviso si los dispensadores de papel y alcohol gel tienen suministro.",
        "Dejo el baño limpio y recogido; si falta suministro, lo informo o lo coloco yo.",
        "Si el ascensor tiene marcas de dedos, las limpio.",
        "Si encuentro basura en los pasillos, la recojo.",
        "Si veo algo sucio en el lobby, lo limpio.",
        "Si hay servilletas en el piso de la cafetería, las recojo.",
        "Si veo sillas desordenadas en las salas, las acomodo."
      ]},
      {kind:"quote", mark:"Regla SBM", text:"\u201cSi yo lo veo, yo actúo.\u201d No hay que esperar al supervisor: si detectás algo fuera de orden, actuá de inmediato. Todos cuidamos la operación."}
    ]
  }
];

const QUIZ = [
  { q:"¿Qué significa \u201cLimpiando con los Ojos\u201d?", opts:["Limpiar lo más rápido posible","Ver más allá de la tarea y actuar como dueño del área","Esperar a que el supervisor indique qué hacer"], a:1 },
  { q:"La regla SBM dice:", opts:["\u201cSi lo veo, lo reporto la otra semana\u201d","\u201cSi yo lo veo, yo actúo\u201d","\u201cEso le toca a otro compañero\u201d"], a:1 },
  { q:"¿Cuántos sentidos usamos para observar el área?", opts:["Solo la vista","Los 5 sentidos","Dos: vista y olfato"], a:1 },
  { q:"Vas pasando y ves basura en el pasillo. ¿Qué hacés?", opts:["La dejo, no es mi zona","La recojo de una","Espero a que alguien la reporte"], a:1 },
  { q:"¿Cuándo hacés la revisión visual del área?", opts:["Solo cuando el cliente se queja","En cada turno, antes de retirarme","Una vez al mes"], a:1 },
  { q:"Uno de los 4 principios del programa es:", opts:["Anticiparse","Limpiar solo lo que se ve sucio","Trabajar más rápido que los demás"], a:0 }
];
const PASS = 5;

/* ---------- Supabase ---------- */
const SUPABASE_URL = "https://uamyglxdzmdrwjdfscvg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhbXlnbHhkem1kcndqZGZzY3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjc2MDMsImV4cCI6MjA5Nzc0MzYwM30.VN40WYlbouiBJNAPwAA60ZZmudbtM5DG4JgPaepSDs8";
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { console.warn("Supabase no disponible", e); }

async function guardarRegistro(){
  if(!sb) return { ok:false };
  try {
    const { error } = await sb.from("registros_ojos").insert([{
      nombre: state.nombre,
      proyecto: state.proyecto,
      aciertos: state.correct,
      total: QUIZ.length,
      aprobado: true
    }]);
    if(error){ console.warn("Error al guardar:", error); return { ok:false }; }
    return { ok:true };
  } catch(e){ console.warn("Fallo de red al guardar:", e); return { ok:false }; }
}

/* ---------- Estado ---------- */
const state = { nombre:"", proyecto:"", step:0, qIndex:0, correct:0, answered:false };
// 0 welcome | 1-3 módulos | 4 concurso | 5 quiz | 6 resultado
const TOTAL_STEPS = 7;

const main=document.getElementById('main'), bar=document.getElementById('bar'), modtag=document.getElementById('modtag');
function setProgress(){ bar.style.width=Math.round((state.step/(TOTAL_STEPS-1))*100)+"%"; }
function go(step){ state.step=step; render(); window.scrollTo(0,0); }

function render(){
  setProgress();
  if(state.step===0){ modtag.textContent="Inicio"; renderWelcome(); }
  else if(state.step<=3){ modtag.textContent=MODULOS[state.step-1].tag; renderModule(state.step-1); }
  else if(state.step===4){ modtag.textContent="El concurso"; renderConcurso(); }
  else if(state.step===5){ modtag.textContent="Evaluación"; renderQuiz(); }
  else { modtag.textContent="Comprobante"; renderResult(); }
}

function renderWelcome(){
  main.innerHTML = `
    <div class="screen active">
      <div class="eye-hero">
        <svg width="150" height="92" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 30 Q50 2 96 30 Q50 58 4 30 Z" fill="none" stroke="#1C5C78" stroke-width="4"/>
          <circle cx="50" cy="30" r="15" fill="#E0701D"/>
          <circle cx="50" cy="30" r="6.5" fill="#21303A"/>
          <circle cx="55" cy="25" r="2.5" fill="#fff"/>
        </svg>
      </div>
      <div class="eyebrow" style="text-align:center">Cultura de detalle y prevención</div>
      <h1 style="text-align:center">Limpiando con los Ojos</h1>
      <p class="lead" style="text-align:center">Observar con atención y actuar antes de que el cliente note cualquier imperfección. No se trata de trabajar más duro, sino con más conciencia.</p>
      <div class="field">
        <label for="nombre">Tu nombre completo</label>
        <input id="nombre" type="text" placeholder="Nombre y apellidos" autocomplete="name">
      </div>
      <div class="field">
        <label for="proyecto">Proyecto / cliente</label>
        <input id="proyecto" type="text" placeholder="Escribí el nombre del proyecto">
      </div>
      <button class="btn go" id="startBtn" disabled>Empezar</button>
    </div>`;
  const nombre=document.getElementById('nombre'), proyecto=document.getElementById('proyecto'), startBtn=document.getElementById('startBtn');
  function check(){ startBtn.disabled=!(nombre.value.trim().length>2 && proyecto.value.trim().length>1); }
  nombre.addEventListener('input',()=>{state.nombre=nombre.value.trim();check();});
  proyecto.addEventListener('input',()=>{state.proyecto=proyecto.value.trim();check();});
  startBtn.addEventListener('click',()=>go(1));
}

function sectionHtml(s){
  if(s.kind==="lead") return `<div class="lead-block">${s.text}</div>`;
  if(s.kind==="bullets") return `<div class="blk-title">${s.title}</div><ul class="bullets">${s.items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
  if(s.kind==="checks") return `<div class="blk-title">${s.title}</div><ul class="checks">${s.items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
  if(s.kind==="chips") return `<div class="blk-title">${s.title}</div><div class="chips">${s.items.map(i=>`<span class="chip">${i}</span>`).join("")}</div>`;
  if(s.kind==="cards"||s.kind==="cards-sense"){
    const cls=s.kind==="cards-sense"?"cards sentidos":"cards";
    return `<div class="blk-title">${s.title}</div><div class="${cls}">${s.items.map(c=>`<div class="ccard"><div class="ci">${c.icon}</div><div class="ch">${c.head}</div><div class="ct">${c.text}</div></div>`).join("")}</div>`;
  }
  if(s.kind==="quote") return `<div class="quote"><div class="qm">${s.mark}</div>${s.text}</div>`;
  if(s.kind==="callout") return `<div class="callout">${s.text}</div>`;
  return "";
}

function renderModule(i){
  const m=MODULOS[i], isLast=i===2;
  main.innerHTML = `
    <div class="screen active">
      <div class="modhead">
        <div class="icn">${SVG[m.icon]}</div>
        <div><div class="eyebrow">${m.tag}</div><h2>${m.titulo}</h2></div>
      </div>
      ${m.sections.map(sectionHtml).join("")}
      <div class="nav">
        ${i>0?'<button class="btn ghost" id="prevBtn">Atrás</button>':''}
        <button class="btn go" id="nextBtn">${isLast?'Siguiente':'Siguiente'}</button>
      </div>
    </div>`;
  const prev=document.getElementById('prevBtn');
  if(prev) prev.addEventListener('click',()=>go(state.step-1));
  document.getElementById('nextBtn').addEventListener('click',()=>go(state.step+1));
}

function renderConcurso(){
  main.innerHTML = `
    <div class="screen active">
      <div class="eyebrow">Reconocimiento</div>
      <h1>El concurso mensual</h1>
      <p class="lead">Cada mes premiamos a los 3 campeones de Limpiando con los Ojos. Tu forma de trabajar te puede poner en el TOP 3.</p>
      <div class="prize"><span class="pe">🏆</span><div>Tarjeta de regalo + el reconocimiento de todos los compañeros.</div></div>
      <div class="blk-title">¿Cómo ganar?</div>
      <ol class="steps">
        <li>Demostrá que aplicás la filosofía cada día con los ejemplos que reportás.</li>
        <li>Podés proponer a compañeros que sobresalgan aplicándola.</li>
        <li>Según la cantidad de ejemplos, elegimos el TOP 3 cada mes.</li>
        <li>Ganás tu premio y el reconocimiento del equipo.</li>
      </ol>
      <div class="callout" style="margin-top:20px"><b>¡Demostremos que somos los mejores!</b> Cada detalle que cuidás suma para vos y para todo el equipo.</div>
      <div class="nav">
        <button class="btn ghost" id="prevBtn">Atrás</button>
        <button class="btn go" id="nextBtn">Ir a la evaluación</button>
      </div>
    </div>`;
  document.getElementById('prevBtn').addEventListener('click',()=>go(3));
  document.getElementById('nextBtn').addEventListener('click',()=>go(5));
}

function renderQuiz(){
  if(state.qIndex===0) state.correct=0;
  state.answered=false;
  const item=QUIZ[state.qIndex];
  main.innerHTML = `
    <div class="screen active">
      <div class="eyebrow">Evaluación</div>
      <div class="qcount">Pregunta ${state.qIndex+1} de ${QUIZ.length} · Aciertos: ${state.correct}</div>
      <h2 style="margin-bottom:16px">${item.q}</h2>
      <div id="opts">${item.opts.map((o,idx)=>`<button class="opt" data-i="${idx}">${o}</button>`).join("")}</div>
      <div class="feedback" id="fb"></div>
      <button class="btn go" id="qNext" style="display:none">${state.qIndex===QUIZ.length-1?'Ver mi resultado':'Siguiente pregunta'}</button>
    </div>`;
  const fb=document.getElementById('fb'), qNext=document.getElementById('qNext');
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(state.answered) return;
      state.answered=true;
      const chosen=parseInt(btn.dataset.i,10), correct=item.a;
      document.querySelectorAll('.opt').forEach(b=>b.classList.add('locked'));
      document.querySelector(`.opt[data-i="${correct}"]`).classList.add('correct');
      if(chosen===correct){ state.correct++; fb.className="feedback ok"; fb.textContent="¡Correcto! Así se hace."; }
      else { btn.classList.add('wrong'); fb.className="feedback no"; fb.textContent="Esa no era. La respuesta correcta quedó marcada."; }
      qNext.style.display="block";
    });
  });
  qNext.addEventListener('click',()=>{
    if(state.qIndex===QUIZ.length-1) go(6);
    else { state.qIndex++; render(); window.scrollTo(0,0); }
  });
}

function renderResult(){
  const passed=state.correct>=PASS;
  const fecha=new Date().toLocaleDateString('es-CR',{day:'2-digit',month:'long',year:'numeric'});
  if(passed){
    main.innerHTML = `
      <div class="screen active">
        <div class="cert">
          <div class="ctop"></div>
          <div class="cbody">
            <div class="ctitle">Comprobante de capacitación</div>
            <div class="seal"><div class="ring">✓</div></div>
            <div class="name">${escapeHtml(state.nombre)}</div>
            <div class="meta">${escapeHtml(state.proyecto)} · ${fecha}</div>
            <div class="scorebox">
              <div><span class="num">${state.correct}/${QUIZ.length}</span><span class="lbl">Aciertos</span></div>
              <div><span class="num" style="color:var(--orange)">APROBADO</span><span class="lbl">Resultado</span></div>
            </div>
            <div class="meta" style="margin-top:14px;font-size:14px">Programa Limpiando con los Ojos · SBM Costa Rica</div>
            <div class="finalmsg">\u201cLa excelencia no está en hacer grandes cosas una vez. Está en cuidar los pequeños detalles todos los días.\u201d</div>
          </div>
        </div>
        <div class="savebadge saving" id="saveStatus"><span class="se">⏳</span><span>Guardando tu registro…</span></div>
        <div class="capture-note"><span class="em">📸</span><span>Como respaldo, podés tomar una <b>captura</b> de este comprobante.</span></div>
        <button class="btn ghost" id="restart" style="margin-top:14px">Hacerla de nuevo</button>
      </div>`;
    document.getElementById('restart').addEventListener('click',()=>{state.qIndex=0;state.correct=0;go(0);});
    guardarRegistro().then(res=>{
      const el=document.getElementById('saveStatus');
      if(!el) return;
      if(res.ok){ el.className="savebadge ok"; el.innerHTML='<span class="se">✓</span><span>Listo. Tu registro quedó guardado.</span>'; }
      else { el.className="savebadge err"; el.innerHTML='<span class="se">⚠️</span><span>No se pudo guardar en línea. <b>Tomá la captura</b> y enviásela a tu supervisor.</span>'; }
    });
  } else {
    main.innerHTML = `
      <div class="screen active">
        <div class="eyebrow" style="color:#C5283D">Casi</div>
        <h1>Repasemos y volvé a intentar</h1>
        <p class="lead">Sacaste <b>${state.correct} de ${QUIZ.length}</b>. Para aprobar necesitás al menos ${PASS}. Volvé a leer y hacé la evaluación otra vez. La idea no es la nota, es desarrollar el ojo preventivo.</p>
        <div class="callout">Recordá: usar los 5 sentidos en todo momento, actuar sin esperar al supervisor, y la regla <b>\u201cSi yo lo veo, yo actúo.\u201d</b></div>
        <button class="btn go" id="redo">Repasar la evaluación</button>
        <button class="btn ghost" id="reread" style="margin-top:12px">Volver a leer los módulos</button>
      </div>`;
    document.getElementById('redo').addEventListener('click',()=>{state.qIndex=0;state.correct=0;go(5);});
    document.getElementById('reread').addEventListener('click',()=>{state.qIndex=0;state.correct=0;go(1);});
  }
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ---------- Panel del supervisor ---------- */
const PIN_ADMIN = "2580"; // cambiá este PIN
let REGISTROS = [];

const overlay = document.getElementById('adminOverlay');
const adminBody = document.getElementById('adminBody');
document.getElementById('adminOpen').addEventListener('click', ()=>{ overlay.classList.add('on'); renderPin(); });
document.getElementById('adminClose').addEventListener('click', ()=>{ overlay.classList.remove('on'); });
overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.classList.remove('on'); });

function renderPin(msg){
  adminBody.innerHTML = `
    <p style="margin-top:0">Ingresá el PIN para ver los registros de la capacitación.</p>
    <div class="pinrow">
      <input id="pinInput" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off">
      <button class="xbtn rf" id="pinBtn">Entrar</button>
    </div>
    <div class="pinmsg">${msg||""}</div>`;
  const inp=document.getElementById('pinInput');
  const go=()=>{ if(inp.value===PIN_ADMIN) loadRegistros(); else renderPin("PIN incorrecto. Probá de nuevo."); };
  document.getElementById('pinBtn').addEventListener('click', go);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
  inp.focus();
}

async function loadRegistros(){
  adminBody.innerHTML = `<p class="pempty">Cargando registros…</p>`;
  if(!sb){ adminBody.innerHTML = `<p class="pempty">No hay conexión con la base de datos. Subí la app a tu dominio para ver los registros.</p>`; return; }
  try {
    const { data, error } = await sb.from("registros_ojos").select("*").order("created_at",{ascending:false});
    if(error) throw error;
    REGISTROS = data||[];
    renderTabla("");
  } catch(e){
    console.warn(e);
    adminBody.innerHTML = `<p class="pempty">No se pudieron cargar los registros.<br>Revisá que exista la política de lectura en Supabase.</p>`;
  }
}

function fmtFecha(iso){
  try { return new Date(iso).toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch(e){ return iso; }
}

function filtrados(q){
  q=(q||"").trim().toLowerCase();
  if(!q) return REGISTROS;
  return REGISTROS.filter(r=>(r.nombre||"").toLowerCase().includes(q)||(r.proyecto||"").toLowerCase().includes(q));
}

function renderTabla(q){
  const rows = filtrados(q);
  const body = rows.length ? rows.map(r=>`
    <tr>
      <td>${fmtFecha(r.created_at)}</td>
      <td>${escapeHtml(r.nombre||"")}</td>
      <td>${escapeHtml(r.proyecto||"")}</td>
      <td>${r.aciertos??""}/${r.total??""}</td>
      <td><span class="pill">Aprobado</span></td>
    </tr>`).join("") : `<tr><td colspan="5"><div class="pempty">Sin registros todavía.</div></td></tr>`;
  adminBody.innerHTML = `
    <div class="toolbar">
      <input id="buscar" type="text" placeholder="Buscar por nombre o proyecto…" value="${escapeHtml(q||"")}">
      <button class="xbtn rf" id="refrescar">Refrescar</button>
      <button class="xbtn xls" id="expXls">Excel</button>
      <button class="xbtn pdf" id="expPdf">PDF</button>
    </div>
    <div class="pcount">${rows.length} registro(s)${q?` · filtrando "${escapeHtml(q)}"`:""}</div>
    <div class="tablewrap">
      <table class="reg">
        <thead><tr><th>Fecha</th><th>Nombre</th><th>Proyecto</th><th>Aciertos</th><th>Resultado</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>`;
  const buscar=document.getElementById('buscar');
  buscar.addEventListener('input', ()=>{ const v=buscar.value; const pos=buscar.selectionStart; renderTabla(v); const nb=document.getElementById('buscar'); nb.focus(); try{nb.setSelectionRange(pos,pos);}catch(e){} });
  document.getElementById('refrescar').addEventListener('click', loadRegistros);
  document.getElementById('expXls').addEventListener('click', ()=>exportarExcel(q));
  document.getElementById('expPdf').addEventListener('click', ()=>exportarPDF(q));
}

function datosExport(q){
  return filtrados(q).map(r=>({
    Fecha: fmtFecha(r.created_at),
    Nombre: r.nombre||"",
    Proyecto: r.proyecto||"",
    Aciertos: `${r.aciertos??""}/${r.total??""}`,
    Resultado: "Aprobado"
  }));
}

function exportarExcel(q){
  const datos = datosExport(q);
  if(!datos.length){ alert("No hay registros para exportar."); return; }
  const ws = XLSX.utils.json_to_sheet(datos);
  ws['!cols'] = [{wch:12},{wch:28},{wch:20},{wch:10},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Registros");
  XLSX.writeFile(wb, `Limpiando_con_los_Ojos_${hoyStr()}.xlsx`);
}

function exportarPDF(q){
  const datos = datosExport(q);
  if(!datos.length){ alert("No hay registros para exportar."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(15); doc.setTextColor(28,92,120);
  doc.text("Limpiando con los Ojos — Registros de capacitación", 14, 16);
  doc.setFontSize(10); doc.setTextColor(90);
  doc.text(`SBM Costa Rica · Generado el ${hoyStr()} · ${datos.length} registro(s)`, 14, 23);
  doc.autoTable({
    startY: 28,
    head: [["Fecha","Nombre","Proyecto","Aciertos","Resultado"]],
    body: datos.map(d=>[d.Fecha,d.Nombre,d.Proyecto,d.Aciertos,d.Resultado]),
    styles:{ fontSize:9, cellPadding:3 },
    headStyles:{ fillColor:[28,92,120], textColor:255, fontStyle:'bold' },
    alternateRowStyles:{ fillColor:[247,244,239] }
  });
  doc.save(`Limpiando_con_los_Ojos_${hoyStr()}.pdf`);
}

function hoyStr(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }

render();
</script>
